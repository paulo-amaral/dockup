version: 2
project_name: dockup

builds:
  - main: ./cmd/dockup
    binary: dockup
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: amd64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^ci:"

release:
  footer: |
    ## Install
    ```sh
    curl -fsSL https://raw.githubusercontent.com/paulo-amaral/dockup/master/install.sh | sh
    ```
