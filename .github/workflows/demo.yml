name: demo

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  vhs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: build dockup into PATH
        run: |
          go build -o dockup-bin ./cmd/dockup
          sudo install -m 0755 dockup-bin /usr/local/bin/dockup
          rm dockup-bin
      - name: install vhs (ffmpeg, ttyd, vhs)
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          curl -fsSL -o /tmp/ttyd https://github.com/tsl0922/ttyd/releases/latest/download/ttyd.x86_64
          sudo install -m 0755 /tmp/ttyd /usr/local/bin/ttyd
          go install github.com/charmbracelet/vhs@latest
      - name: record demo.gif
        run: PATH="$(go env GOPATH)/bin:$PATH" vhs demo.tape
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: regenerate demo.gif"
          file_pattern: demo.gif
